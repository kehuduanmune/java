    // 切换语音输入
    // 切换语音输入
    function toggleVoiceInput() {
        const voiceBtn = document.getElementById('voice-input');

        if (!recognition) {
            initSpeechRecognition();
            if (!recognition) {
                alert('您的浏览器不支持语音识别');
                return;
            }
        }
        // ✅ 先设置回调函数，再启动录音
        // 识别成功
        recognition.onresult = function(e) {
            try {
                let text = e.results[0][0].transcript;
                document.getElementById('chat-input').value = text;
                sendChatMessage();
            } catch (e) {}
            stopVoiceRecording();
        };
        // 识别结束
        recognition.onend = function() {
            stopVoiceRecording();
        };

        // 错误处理
        recognition.onerror = function(err) {
            console.log(err);
            stopVoiceRecording();
            alert(err);
        };

        // ✅ 最后启动录音
        startVoiceRecording();
    }
    // 切换选项卡
    function switchTab(tabId) {
        // 更新选项卡按钮状态
        document.querySelectorAll('.tab-button').forEach(button => {
            button.classList.remove('active');
        });
        document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');

        // 更新内容显示
        document.querySelectorAll('.tab-content').forEach(content => {
            content.classList.add('hidden');
        });
        document.getElementById(tabId).classList.remove('hidden');

        // 如果切换到AI对话，初始化对话
        if (tabId === 'ai-chat' && document.querySelectorAll('#chat-container .dialog-bubble').length === 1) {
            changeAITheme(todayLearningTheme);
            resetChat();
        }

        // 如果切换到句子库，并且有今日学习主题，则选中对应的主题
        if (tabId === 'sentence-library' && todayLearningTheme) {

    // 加载句子
    function loadSentences(theme) {
        const container = document.getElementById('sentences-container');
        container.innerHTML = '';

        sentenceDatabase[theme].forEach((sentence, index) => {
            const sentenceCard = document.createElement('div');
            sentenceCard.className = 'sentence-card';
            sentenceCard.setAttribute('data-index', index);

            sentenceCard.innerHTML = `
                    <div class="flex items-center">
                        <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center mr-3">
                            <i class="fa fa-check text-gray-400"></i>
                        </div>
                        <div class="flex-1">
                            <p class="font-bold text-lg">${sentence.english}</p>
                            <p class="text-sm text-gray-600">${sentence.chinese}</p>
                        </div>
                        <div class="flex space-x-2">
                            <button class="play-sentence p-2 text-primary hover:text-blue-700" title="播放句子">
                                <i class="fa fa-volume-up"></i>
                            </button>
                            <button class="record-sentence p-2 text-secondary hover:text-orange-700" title="录制跟读">
                                <i class="fa fa-microphone"></i>
                            </button>
                        </div>
                    </div>
                `;

            // 点击选中/取消选中
            sentenceCard.addEventListener('click', (e) => {
                // 如果点击的是播放按钮，不切换选中状态
                if (e.target.closest('.play-sentence')) {
                    return;
                }

                toggleSentenceSelection(sentenceCard, index);
            });

            // 播放按钮点击
            sentenceCard.querySelector('.play-sentence').addEventListener('click', () => {
                playSentence(sentence.english);
            });

            // 录音按钮点击
            sentenceCard.querySelector('.record-sentence').addEventListener('click', () => {
                recordSentence(sentence);
            });

            container.appendChild(sentenceCard);
        });
    }

            checkIcon.classList.add('text-white');
            checkCircle.classList.remove('bg-gray-100');

    // 开始任务
    function startTask(task) {
        currentTask = task;

        switch (task) {
            case 'listen':
                // 随机选择一种主题类型
                const themes = Object.keys(sentenceDatabase);
                todayLearningTheme = themes[Math.floor(Math.random() * themes.length)];

                // 加载该主题下的所有句子
                const todaySentences = [...sentenceDatabase[todayLearningTheme]];
                learnSentences(todaySentences);
                break;

            case 'speak':
                // 打开AI对话选项卡
                switchTab('sentence-library');
                // 提示用户开始练习口语
                break;

            case 'chat':
                // 打开AI对话选项卡并开始对话
                switchTab('ai-chat');
                break;
        }
    }

    // 获取随机句子
    function getRandomSentences(theme, count) {
        const sentences = [...sentenceDatabase[theme]];
        const randomSentences = [];

        for (let i = 0; i < count; i++) {
            if (sentences.length === 0) break;

            const randomIndex = Math.floor(Math.random() * sentences.length);
            randomSentences.push(sentences[randomIndex]);
            sentences.splice(randomIndex, 1);
        }

        return randomSentences;
    }

    function isMobile() {
        return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    // 播放句子（文本转语音）
    function playSentence(text) {
        if (!soundEnabled) return;

        if (isMobile()) {
            // 移动端特殊处理
            if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                playSentenceIOS(text);
            } else if (/Android/i.test(navigator.userAgent)) {
                playSentenceAndroid(text);
            }
        }
        // 检查浏览器支持
        if (!('speechSynthesis' in window)) {
            console.error('浏览器不支持语音合成');
            // 可以降级使用音频文件
            playAudioFile(text);
            return;
        }
        // 使用Web Speech API的语音合成
        if ('speechSynthesis' in window) {
            // 停止当前正在播放的语音
            window.speechSynthesis.cancel();

            // 创建新的语音
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.7; // 稍微放慢语速
            utterance.pitch = 1.1; // 稍微提高音调，更适合儿童

            // 播放语音
            window.speechSynthesis.speak(utterance);
        }
    }
    function playAudioFile(text) {
        // 使用在线 TTS 服务生成音频
        const audioUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=en&client=tw-ob&q=${encodeURIComponent(text)}`;
        const audio = new Audio(audioUrl);
        audio.play().catch(e => console.error('播放失败:', e));
    }
    function playSentenceAndroid(text) {
        if (!soundEnabled) return;

        // 确保在用户交互后执行
        if (document.hasFocus()) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.volume = 1.0; // 最大音量

            window.speechSynthesis.speak(utterance);
        } else {
            // 如果页面失去焦点，尝试重新获取
            document.addEventListener('click', function playOnce() {
                playSentence(text);
                document.removeEventListener('click', playOnce);
            }, { once: true });
        }
    }
    function playSentenceIOS(text) {
        if (!soundEnabled) return;

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.7; // 稍微放慢语速
        utterance.pitch = 1.1; // 稍微提高音调，更适合儿童
        // iOS 需要设置 voicesloaded
        const setVoice = () => {
            const voices = window.speechSynthesis.getVoices();
            const englishVoice = voices.find(v => v.lang.includes('en'));
            if (englishVoice) {
                utterance.voice = englishVoice;
            }
        };

        // 等待声音加载
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = setVoice;
        }

        setVoice();
        window.speechSynthesis.speak(utterance);
    }

        } else {
            console.log('没有下一个任务或当前任务索引无效');
        }
    }

    // 重置每日计划
    function resetDailyPlan() {
        completedTasks = [];
        currentTask = null;

        console.log('重置每日计划');



        // 禁用所有任务按钮
        document.querySelectorAll('.task-button').forEach(button => {
            button.disabled = true;
            button.classList.add('opacity-50', 'cursor-not-allowed');
            button.classList.remove('bg-secondary'); // 移除高亮
            button.style.pointerEvents = 'none';
            button.style.opacity = '0.5';
        });

        // 启用第一个任务
        const firstTaskButton = document.querySelector('[data-task="listen"]');
        if (firstTaskButton) {
            firstTaskButton.disabled = false;
            firstTaskButton.classList.remove('opacity-50', 'cursor-not-allowed');
            firstTaskButton.style.pointerEvents = 'auto';
            firstTaskButton.style.opacity = '1';
            console.log('第一个任务已启用');
        }


    }

    // 初始化语音识别
    // 初始化语音识别
    function initSpeechRecognition() {
        try {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = "en-US";
            recognition.continuous = false;
            recognition.interimResults = false;
        } catch (e) {
            recognition = null;
        }
    }

    // 录制句子
    function recordSentence(sentence) {
        currentRecordingSentence = sentence;

        // 检查浏览器支持
        if (!('MediaRecorder' in window) || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert('您的浏览器不支持音频录制功能。');
            return;
        }

        // 请求麦克风权限
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                // 创建音频录制器
                audioRecorder = new MediaRecorder(stream);
                audioChunks = [];

                // 开始录制
                audioRecorder.start();
                isRecording = true;

                // 更新UI显示录制状态
                updateRecordingUI(true);

                // 录制数据处理
                audioRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                // 录制结束处理
                audioRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const audioUrl = URL.createObjectURL(audioBlob);

                    // 播放录制的音频
                    playRecordedAudio(audioUrl);

                    // 比较录制的音频与原句
                    compareRecordingWithOriginal(sentence, audioUrl);

                    // 停止所有轨道
                    stream.getTracks().forEach(track => track.stop());
                };

                // 设置录制时长（5秒）
                setTimeout(() => {
                    if (audioRecorder && audioRecorder.state !== 'inactive') {
                        audioRecorder.stop();
                        isRecording = false;
                        updateRecordingUI(false);
                    }
                }, 5000);
            })
            .catch(error => {
                console.error('获取麦克风权限失败:', error);
                alert('无法访问麦克风，请确保您已授予麦克风权限。');
            });
    }

    // 更新录制UI状态
    function updateRecordingUI(isRecording) {
        const recordButtons = document.querySelectorAll('.record-sentence');

        recordButtons.forEach(button => {
            if (isRecording) {
                button.classList.remove('text-secondary', 'hover:text-orange-700');
                button.classList.add('text-red-500', 'animate-pulse');
                button.querySelector('i').classList.remove('fa-microphone');
                button.querySelector('i').classList.add('fa-stop');
            } else {
                button.classList.remove('text-red-500', 'animate-pulse');
                button.classList.add('text-secondary', 'hover:text-orange-700');
                button.querySelector('i').classList.remove('fa-stop');
                button.querySelector('i').classList.add('fa-microphone');
            }
        });
    }

    // 播放录制的音频
    function playRecordedAudio(audioUrl) {
        const audio = new Audio(audioUrl);
        audio.play().catch(error => {
            console.error('播放录制音频失败:', error);
        });
    }

    // 比较录制的音频与原句
    function compareRecordingWithOriginal(sentence, recordingUrl) {
        // 在实际应用中，这里可以使用语音识别API来比较
        // 由于浏览器端限制，这里简化为模拟比较结果

        // 模拟比较延迟
        setTimeout(() => {
            // 随机生成比较结果（80%的概率正确）
            const isCorrect = Math.random() < 0.8;

            if (isCorrect) {
                showFeedback('太棒了！你读得很好！', 'success');
            } else {
                showFeedback('再试一次吧！你可以做得更好！', 'error');
                // 重新播放原句
                playSentence(sentence.english);
            }
        }, 1000);
    }

    // 显示反馈信息
    function showFeedback(message, type) {
        // 创建反馈元素
        const feedback = document.createElement('div');
        feedback.className = `fixed bottom-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-lg shadow-lg z-50 transition-all duration-300 ${type === 'success' ? 'bg-green-100 text-green-800 border-l-4 border-green-500' : 'bg-red-100 text-red-800 border-l-4 border-red-500'}`;
        feedback.innerHTML = `
                <div class="flex items-center">
                    <i class="fa ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} mr-2"></i>
                    <p>${message}</p>
                </div>
            `;

        // 添加到页面
        document.body.appendChild(feedback);

        // 淡入效果
        setTimeout(() => {
            feedback.classList.add('opacity-90');
        }, 100);

        // 3秒后淡出并移除
        setTimeout(() => {
            feedback.classList.add('opacity-0');
            setTimeout(() => {
                document.body.removeChild(feedback);
            }, 300);
        }, 3000);
    }

    // 录制当前句子（模态框中）
    function recordCurrentSentence() {
        if (learningSentences.length > 0 && currentSentenceIndex < learningSentences.length) {
            const currentSentence = learningSentences[currentSentenceIndex];
            recordSentence(currentSentence);
        }
    }

    // 开始语音录制
    function startVoiceRecording() {
        if (!recognition) return;

        try {
            // 防止重复启动
            recognition.abort();

            // 重新配置（防止状态丢失）
            recognition.lang = 'en-US';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.start();
            isRecording = true;

            const voiceButton = document.getElementById('voice-input');
            voiceButton.classList.remove('bg-gray-200');
            voiceButton.classList.add('bg-red-500');
            voiceButton.querySelector('i').classList.remove('text-gray-700');
            voiceButton.querySelector('i').classList.add('text-white');

        } catch (error) {
            console.error('启动语音识别失败:', error);
            stopVoiceRecording();
        }
    }

    // 停止语音录制
    function stopVoiceRecording() {
        if (!recognition) return;

        recognition.stop();
        isRecording = false;

        const voiceButton = document.getElementById('voice-input');
        voiceButton.classList.remove('bg-red-500');
        voiceButton.classList.add('bg-gray-200');
        voiceButton.querySelector('i').classList.remove('text-white');
        voiceButton.querySelector('i').classList.add('text-gray-700');
    }

    // 发送聊天消息
    function sendChatMessage() {
        const input = document.getElementById('chat-input');
        const message = input.value.trim();

        if (message === '') return;

        // 添加用户消息到聊天窗口
        addChatMessage(message, 'user');

        // 清空输入框
        input.value = '';

        // 生成AI回复
        setTimeout(() => {
            const reply = generateAIReply(message);
            addChatMessage(reply, 'robot');

            // 播放AI回复
            playSentence(reply);

            // 增加对话计数
            chatMessageCount++;

            // 检查对话是否完成（例如：完成了5轮对话）
            if (chatMessageCount >= 5 && currentTask === 'chat') {
                debugger
                // 完成对话任务
                completeTask();

                // 显示完成消息
                setTimeout(() => {
                    alert('恭喜你完成了今天的所有学习任务！你真棒！');
                    // 重置每日计划
                    resetDailyPlan();
                }, 1500);
            }
        }, 1000);
    }

    // 添加聊天消息
    function addChatMessage(message, sender) {
        const chatContainer = document.getElementById('chat-container');
        const messageDiv = document.createElement('div');

        messageDiv.className = `dialog-bubble ${sender === 'user' ? 'dialog-bubble-user' : 'dialog-bubble-robot'}`;
        messageDiv.innerHTML = `<p>${message}</p>`;

        chatContainer.appendChild(messageDiv);

        // 滚动到底部
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // 生成AI回复
    function generateAIReply(userMessage) {
        const topic = document.getElementById('chat-topic').value;
        const dialogues = chatDatabase[topic];

        // 简单的关键词匹配
        userMessage = userMessage.toLowerCase();

        // 检查是否有预设的回复
        for (let i = 0; i < dialogues.length; i++) {
            const userPattern = dialogues[i].user.toLowerCase();

            // 检查是否匹配当前对话流程
            if (i < dialogues.length - 1) {
                const lastRobotMessage = document.querySelectorAll('#chat-container .dialog-bubble-robot p:last-child');
                if (lastRobotMessage.length > 0 && lastRobotMessage[lastRobotMessage.length - 1].textContent === dialogues[i].robot) {
                    return dialogues[i + 1].robot;
                }
            }
        }

        // 如果没有匹配到，返回一个通用回复
        const genericReplies = [
            "That's interesting! Tell me more.",
            "I see! What else do you like?",
            "Great job! You're speaking English well!",
            "Can you say that again?",
            "That's correct! Well done!",
            "I like talking to you!",
            "What do you want to talk about?",
            "Do you have any questions?",
            "You're learning fast!",
            "Let's practice more English together!"
        ];

        return genericReplies[Math.floor(Math.random() * genericReplies.length)];
    }

    // 重置聊天
    function resetChat() {
        // 重置对话计数
        chatMessageCount = 0;

        const chatContainer = document.getElementById('chat-container');

        // 保留初始消息
        chatContainer.innerHTML = `
                <div class="dialog-bubble dialog-bubble-robot">
                    <p>你好！我是你的英语学习伙伴。今天我们来练习英语对话吧！</p>
                </div>
            `;

        // 根据主题生成第一个问题
        const topic = document.getElementById('chat-topic').value;
        const firstQuestion = chatDatabase[topic][0].robot;

        setTimeout(() => {
            addChatMessage(firstQuestion, 'robot');
            playSentence(firstQuestion);
        }, 500);
    }

    // 切换声音
    function toggleSound() {
        soundEnabled = !soundEnabled;

        const soundButton = document.getElementById('sound-toggle');

        if (soundEnabled) {
            soundButton.innerHTML = '<i class="fa fa-volume-up"></i>';
        } else {
            soundButton.innerHTML = '<i class="fa fa-volume-off"></i>';
            // 停止当前播放的语音
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
        }
    }

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', init);
</script>
