    // 初始化函数
    function init() {
        // 加载句子库
        loadSentences(currentTheme);

        // 初始化语音识别（如果浏览器支持）
        initSpeechRecognition();

        // 绑定事件监听器
        bindEventListeners();
    }

    // 绑定事件监听器
    function bindEventListeners() {
        // 选项卡切换
        document.querySelectorAll('.tab-button').forEach(button => {
            button.addEventListener('click', () => {
                const tabId = button.getAttribute('data-tab');
                switchTab(tabId);
            });
        });

        // 任务按钮点击
        document.querySelectorAll('.task-button').forEach(button => {
            button.addEventListener('click', () => {
                const task = button.getAttribute('data-task');
                startTask(task);
            });
        });

        // 主题按钮点击
        document.querySelectorAll('.theme-button').forEach(button => {
            button.addEventListener('click', () => {
                const theme = button.getAttribute('data-theme');
                changeTheme(theme);
            });
        });

        // 学习选中的句子
        document.getElementById('learn-selected').addEventListener('click', () => {
            if (selectedSentences.length > 0) {
                // 将索引转换为实际的句子对象
                const sentencesToLearn = selectedSentences.map(index => sentenceDatabase[currentTheme][index]);
                learnSentences(sentencesToLearn);
            } else {
            }
        });

        // 模态框控制
        document.getElementById('close-modal').addEventListener('click', closeModal);
        document.getElementById('prev-sentence').addEventListener('click', showPreviousSentence);
        document.getElementById('next-sentence').addEventListener('click', showNextSentence);
        document.getElementById('play-sentence').addEventListener('click', playCurrentSentence);
        document.getElementById('record-modal-sentence').addEventListener('click', recordCurrentSentence);

        document.getElementById('sound-toggle').addEventListener('click', toggleSound);

        document.getElementById('chat-input').addEventListener('keypress', (e) => {

                sendChatMessage();

        document.getElementById('voice-input').addEventListener('click', toggleVoiceInput);

        document.querySelectorAll('.quick-response').forEach(button => {

                const text = button.textContent;
                document.getElementById('chat-input').value = text;

    // 切换语音输入
    // 切换语音输入
    function toggleVoiceInput() {
        const voiceBtn = document.getElementById('voice-input');

        if (!recognition) {
            initSpeechRecognition();
            if (!recognition) {
                alert('您的浏览器不支持语音识别');
                return;
            }
        }
        // ✅ 先设置回调函数，再启动录音
        // 识别成功
        recognition.onresult = function(e) {
            try {
                let text = e.results[0][0].transcript;
                document.getElementById('chat-input').value = text;
                sendChatMessage();
            } catch (e) {}
            stopVoiceRecording();
        };
        // 识别结束
        recognition.onend = function() {
            stopVoiceRecording();
        };

        // 错误处理
        recognition.onerror = function(err) {
            console.error('语音识别错误:', err);
            stopVoiceRecording();

            // ✅ 根据错误类型给出友好提示
            if (err.error === 'not-allowed') {
                alert('❌ 无法访问麦克风：您已拒绝麦克风权限。\n\n请在浏览器地址栏右侧点击锁形图标，允许使用麦克风，然后刷新页面。\n\n或者使用句子跟读功能（点击句子旁的麦克风图标）。');
            } else if (err.error === 'no-speech') {
                alert('🎤 没有检测到语音，请对着麦克风说话。');
            } else if (err.error === 'audio-capture') {
                alert('🔌 找不到麦克风设备，请检查麦克风是否已连接。');
            } else if (err.error === 'network') {
                alert('🌐 网络连接失败，请检查网络后重试。');
            } else if (err.error === 'language-not-supported') {
                alert('🗣️ 不支持的语言设置。');
            } else {
                alert('⚠️ 语音识别失败：' + (err.message || '未知错误') + '\n错误类型：' + (err.error || 'unknown'));
            }
        };

        // ✅ 最后启动录音
        startVoiceRecording();
    }
    // 切换选项卡
    function switchTab(tabId) {

        document.querySelectorAll('.tab-button').forEach(button => {
            button.classList.remove('active');
        });
        document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');

        // 更新内容显示
        document.querySelectorAll('.tab-content').forEach(content => {
            content.classList.add('hidden');
        });

        if (tabId === 'ai-chat' && document.querySelectorAll('#chat-container .dialog-bubble').length === 1) {
            changeAITheme(todayLearningTheme);
            resetChat();
        }

        // 如果切换到句子库，并且有今日学习主题，则选中对应的主题
        if (tabId === 'sentence-library' && todayLearningTheme) {

    // 加载句子
    function loadSentences(theme) {
        const container = document.getElementById('sentences-container');
        container.innerHTML = '';

        sentenceDatabase[theme].forEach((sentence, index) => {
            const sentenceCard = document.createElement('div');
            sentenceCard.className = 'sentence-card';
            sentenceCard.setAttribute('data-index', index);

            sentenceCard.innerHTML = `
                    <div class="flex items-center">
                        <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center mr-3">
                            <i class="fa fa-check text-gray-400"></i>
                        </div>
                        <div class="flex-1">
                            <p class="font-bold text-lg">${sentence.english}</p>
                            <p class="text-sm text-gray-600">${sentence.chinese}</p>
                        </div>
                        <div class="flex space-x-2">
                            <button class="play-sentence p-2 text-primary hover:text-blue-700" title="播放句子">
                                <i class="fa fa-volume-up"></i>
                            </button>
                            <button class="record-sentence p-2 text-secondary hover:text-orange-700" title="录制跟读">
                                <i class="fa fa-microphone"></i>
                            </button>
                        </div>
                    </div>
                `;

            // 点击选中/取消选中
            sentenceCard.addEventListener('click', (e) => {
                // 如果点击的是播放按钮，不切换选中状态
                if (e.target.closest('.play-sentence')) {
                    return;
                }

                toggleSentenceSelection(sentenceCard, index);
            });

            // 播放按钮点击
            sentenceCard.querySelector('.play-sentence').addEventListener('click', () => {
                playSentence(sentence.english);
            });

            // 录音按钮点击
            sentenceCard.querySelector('.record-sentence').addEventListener('click', () => {
                recordSentence(sentence);
            });

            container.appendChild(sentenceCard);
        });
    }

    // 切换句子选中状态
    function toggleSentenceSelection(card, index) {
        const checkIcon = card.querySelector('.fa-check');
        const checkCircle = card.querySelector('.w-8');

        if (card.classList.contains('active')) {
            // 取消选中
            card.classList.remove('active');
            checkIcon.classList.remove('text-white');
            checkIcon.classList.add('text-gray-400');
            checkCircle.classList.remove('bg-primary');
            checkCircle.classList.add('bg-gray-100');

            // 从选中列表中移除
            selectedSentences = selectedSentences.filter(i => i !== index);
        } else {
            // 选中
            card.classList.add('active');
            checkIcon.classList.remove('text-gray-400');
            checkIcon.classList.add('text-white');
            checkCircle.classList.remove('bg-gray-100');
            checkCircle.classList.add('bg-primary');

            // 添加到选中列表
            selectedSentences.push(index);
        }
    }

    // 改变主题
    function changeTheme(theme) {
        // 更新主题按钮状态
        document.querySelectorAll('.theme-button').forEach(button => {
            button.classList.remove('active', 'bg-primary', 'text-white');
            button.classList.add('bg-gray-200', 'text-gray-700');

    // 开始任务
    function startTask(task) {
        currentTask = task;

        switch (task) {
            case 'listen':
                // 随机选择一种主题类型
                const themes = Object.keys(sentenceDatabase);
                todayLearningTheme = themes[Math.floor(Math.random() * themes.length)];

                // 加载该主题下的所有句子
                const todaySentences = [...sentenceDatabase[todayLearningTheme]];
                learnSentences(todaySentences);
                break;

            case 'speak':
                // 打开AI对话选项卡
                switchTab('sentence-library');
                // 提示用户开始练习口语
                break;

            case 'chat':
                // 打开AI对话选项卡并开始对话
                switchTab('ai-chat');
                break;
        }
    }

    // 获取随机句子
    function getRandomSentences(theme, count) {
        const sentences = [...sentenceDatabase[theme]];
        const randomSentences = [];

        for (let i = 0; i < count; i++) {
            if (sentences.length === 0) break;

            const randomIndex = Math.floor(Math.random() * sentences.length);
            randomSentences.push(sentences[randomIndex]);
            sentences.splice(randomIndex, 1);
        }

        return randomSentences;
    }

    function isMobile() {
        return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    // 播放句子（文本转语音）
    function playSentence(text) {
        if (!soundEnabled) return;

        if (isMobile()) {
            // 移动端特殊处理
            if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                playSentenceIOS(text);
            } else if (/Android/i.test(navigator.userAgent)) {
                playSentenceAndroid(text);
            }
        }
        // 检查浏览器支持
        if (!('speechSynthesis' in window)) {
            console.error('浏览器不支持语音合成');
            // 可以降级使用音频文件
            playAudioFile(text);
            return;
        }
        // 使用Web Speech API的语音合成
        if ('speechSynthesis' in window) {
            // 停止当前正在播放的语音
            window.speechSynthesis.cancel();

            // 创建新的语音
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';

            // 优化语音参数，使其更自然
            utterance.rate = 0.85; // 稍微放慢语速，更清晰
            utterance.pitch = 1.0; // 正常音调
            utterance.volume = 1.0; // 正常音量

            // 选择更自然的英语语音
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(voice =>
                voice.lang === 'en-US' &&
                    (voice.name.includes('Google') ||
                    voice.name.includes('Natural') ||
                    voice.name.includes('Samantha') ||
                    voice.name.includes('Daniel')||
                    voice.name.includes('Zira'))
            );

            if (preferredVoice) {
                utterance.voice = preferredVoice;
            } else {
                // 如果没有找到首选语音，使用第一个英语语音
                const englishVoice = voices.find(v => v.lang.includes('en-US'));
                if (englishVoice) {
                    utterance.voice = englishVoice;
                }
            }

            // 添加语调变化，使发音更自然
            addProsodyToUtterance(utterance, text);

            // 播放语音
            window.speechSynthesis.speak(utterance);
        }
    }

    // 为语音添加韵律和语调变化
    function addProsodyToUtterance(utterance, text) {
        // 根据句子类型调整音调
        if (text.endsWith('?')) {
            // 疑问句：句尾音调略微上升，语速稍慢
            utterance.pitch = 1.1;
            utterance.rate = 0.8;
        } else if (text.endsWith('!')) {
            // 感叹句：更有活力，音调稍高
            utterance.pitch = 1.05;
            utterance.rate = 0.9;
        } else {
            // 陈述句：正常语调，温和的语速
            utterance.pitch = 1.0;
            utterance.rate = 0.85;
        }

        // 监听边界事件，在适当位置添加停顿
        let lastWordIndex = 0;
        utterance.onboundary = function(event) {
            if (event.name === 'word') {
                const wordEnd = event.charIndex + event.charLength;

                // 在逗号后添加短暂停顿
                if (text.charAt(wordEnd) === ',') {
                    // 浏览器会自动处理标点停顿
                }

                // 在句号后添加较长停顿
                if (text.charAt(wordEnd) === '.' || text.charAt(wordEnd) === '!' || text.charAt(wordEnd) === '?') {
                    // 浏览器会自动处理标点停顿
                }

                lastWordIndex = wordEnd;
            }
        };
    }
    function playAudioFile(text) {
        // 使用在线 TTS 服务生成音频
        const audioUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=en&client=tw-ob&q=${encodeURIComponent(text)}`;
        const audio = new Audio(audioUrl);
        audio.play().catch(e => console.error('播放失败:', e));
    }
    function playSentenceAndroid(text) {
        if (!soundEnabled) return;

        // 确保在用户交互后执行
        if (document.hasFocus()) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.volume = 1.0; // 最大音量
            utterance.rate = 0.85; // 更自然的语速
            utterance.pitch = 1.0; // 正常音调

            // 选择优质语音
            const voices = window.speechSynthesis.getVoices();
            const englishVoice = voices.find(v =>
                v.lang.includes('en-US') &&
                (v.name.includes('Google') || v.name.includes('Samsung'))
            );
            if (englishVoice) {
                utterance.voice = englishVoice;
            }

            window.speechSynthesis.speak(utterance);
        } else {

    // 录制句子
    function recordSentence(sentence) {
        currentRecordingSentence = sentence;

        // 检查浏览器支持
        if (!('MediaRecorder' in window) || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert('您的浏览器不支持音频录制功能。');
            return;
        }

        // 请求麦克风权限
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                // 创建音频录制器
                audioRecorder = new MediaRecorder(stream);
                audioChunks = [];

                // 开始录制
                audioRecorder.start();
                isRecording = true;

                // 更新UI显示录制状态
                updateRecordingUI(true);

                // 录制数据处理
                audioRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                // 录制结束处理
                audioRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const audioUrl = URL.createObjectURL(audioBlob);

                    // 播放录制的音频
                    playRecordedAudio(audioUrl);

                    // 比较录制的音频与原句
                    compareRecordingWithOriginal(sentence, audioUrl);

                    // 停止所有轨道
                    stream.getTracks().forEach(track => track.stop());
                };

                // 设置录制时长（5秒）
                setTimeout(() => {
                    if (audioRecorder && audioRecorder.state !== 'inactive') {
                        audioRecorder.stop();
                        isRecording = false;
                        updateRecordingUI(false);
                    }
                }, 5000);
            })
            .catch(error => {
                console.error('获取麦克风权限失败:', error);
                alert('无法访问麦克风，请确保您已授予麦克风权限。');
            });
    }

    // 检查用户回答是否匹配问题                 用户回答     问题       对话列表
    function checkIfAnswerMatchesQuestion(userAnswer, question, dialogues) {
        // 将文本转为小写进行比较
        const answerLower = userAnswer.toLowerCase();
        const questionLower = question.toLowerCase();

        // 方法 1: 检查是否在预设对话中
        for (let dialogue of dialogues) {
            if (dialogue.robot.toLowerCase() === questionLower) {
                // 找到对应的问题，检查答案是否合理
                const expectedAnswer = dialogue.user.toLowerCase();

                // 检查是否包含关键词
                const answerWords = answerLower.split(/\s+/);
                const expectedWords = expectedAnswer.split(/\s+/);

                // 计算单词匹配度
                let matchCount = 0;
                for (let word of answerWords) {
                    if (expectedWords.includes(word) || word.length > 3 && expectedWords.some(ew => ew.includes(word))) {
                        matchCount++;
                    }
                }

                // 如果有一定比例的匹配，认为是相关的
                const matchRatio = matchCount / Math.max(answerWords.length, expectedWords.length);
                if (matchRatio >= 0.3) {
                    return true;
                }
            }
        }

        // 方法 2: 通用相关性检查
        // 检查是否回答了常见疑问词
        const questionWords = {
            'what': ['thing', 'object', 'it', 'this', 'that'],
            'where': ['place', 'location', 'here', 'there', 'at', 'in', 'on'],
            'when': ['time', 'hour', 'day', 'date', 'at', 'on', 'in'],
            'who': ['person', 'he', 'she', 'they', 'name'],
            'why': ['because', 'reason', 'so', 'therefore'],
            'how': ['way', 'method', 'by', 'with', 'use'],
            'do/does': ['yes', 'no', 'like', 'want', 'have'],
            'is/are': ['yes', 'no', 'it', 'they', 'this', 'that']
        };

        // 识别问题类型
        let questionType = null;
        for (let qWord in questionWords) {
            if (questionLower.includes(qWord)) {
                questionType = qWord;
                break;
            }
        }

        // 根据问题类型检查回答
        if (questionType) {
            const keywords = questionWords[questionType];
            for (let keyword of keywords) {
                if (answerLower.includes(keyword)) {
                    return true;
                }
            }

            // 特殊处理 Yes/No 问题
            if (['do/does', 'is/are'].includes(questionType)) {
                if (answerLower.startsWith('yes') || answerLower.startsWith('no')) {
                    return true;
                }
            }
        }

        // 方法 3: 如果回答长度合理，默认接受（避免过于严格）
        if (answerLower.length >= 3) {
            return true;
        }

        return false;
    }
